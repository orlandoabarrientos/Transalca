<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transalca Group | La mejor calidad</title>
    <link rel="icon" type="image/png" href="/public/img/logo.png">
    <link href="/public/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/public/bootstrap/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/public/sweetalert2/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/public/css/styles.css">
    <link rel="stylesheet" href="/componente_ia/chat_widget.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .loyalty-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            padding: 10px 0;
        }

        /* Container wrapper for the premium loyalty cards */
        .loyalty-card-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: var(--transition);
        }

        .loyalty-card-wrapper:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        /* Physical Credit Card Representation */
        .fidelity-card-physical {
            width: 100%;
            aspect-ratio: 1.586; /* Standard credit card ratio */
            border-radius: 14px;
            padding: 18px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: #fff;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
            transition: transform 0.3s;
            text-shadow: 0 1.5px 3px rgba(0, 0, 0, 0.85);
            background-size: cover !important;
            background-position: center !important;
        }

        .fidelity-card-physical::before {
            content: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 50%);
            pointer-events: none;
        }

        .fidelity-card-physical > * {
            display: none !important;
        }

        .card-meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1;
        }

        .card-brand-logo {
            font-size: 0.95rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.95);
            text-transform: uppercase;
        }

        .card-chip-gold {
            width: 36px;
            height: 28px;
            background: linear-gradient(135deg, #ffd700 0%, #d4af37 50%, #aa7c11 100%);
            border-radius: 5px;
            position: relative;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.4), 0 1px 3px rgba(0,0,0,0.3);
        }

        .card-chip-gold::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 6px;
            width: 24px;
            height: 22px;
            border: 1px solid rgba(0,0,0,0.2);
            border-radius: 3px;
        }

        .card-contactless {
            font-size: 1.25rem;
            opacity: 0.8;
            color: #fff;
        }

        .card-number-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.05rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 6px 0;
            color: #f8fafc;
            z-index: 1;
        }

        .card-holder-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 1;
        }

        .card-holder-name {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #f1f5f9;
        }

        .card-holder-cedula {
            font-size: 0.68rem;
            color: #cbd5e1;
        }

        .card-status-badge {
            font-size: 0.6rem;
            font-weight: 800;
            letter-spacing: 1px;
            padding: 3px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .card-status-badge.active-badge {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border-color: rgba(34, 197, 94, 0.4);
        }

        .card-status-badge.redeemed-badge {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border-color: rgba(239, 68, 68, 0.4);
        }

        /* Stamps & Info Panel */
        .card-stamps-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .punch-card-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin: 8px 0;
        }

        .punch-slot {
            aspect-ratio: 1;
            border-radius: 50%;
            border: 2px dashed var(--border);
            background: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            color: var(--text-muted);
            font-weight: 600;
            position: relative;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .punch-slot.filled {
            border-style: solid;
            border-color: #eab308;
            background: radial-gradient(circle, #fef08a 0%, #eab308 100%);
            box-shadow: 0 0 8px rgba(234, 179, 8, 0.4);
            color: #fff;
            transform: scale(1.05);
        }

        .punch-slot.filled i {
            font-size: 0.95rem;
            color: #fff;
        }

        .punch-slot.reward-slot {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--bg-main);
        }

        .punch-slot.reward-slot.filled {
            border-style: solid;
            border-color: var(--primary);
            background: radial-gradient(circle, var(--primary-glow) 0%, var(--primary) 100%);
            box-shadow: 0 0 10px var(--primary-glow);
            color: #fff;
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div id="navbarContainer"></div>
    <div class="container py-4">
        <h3 class="fw-bold mb-2"><i class="bi bi-gift-fill me-2" style="color:var(--highlight);"></i>Mi Programa de
            Fidelización</h3>
        <p class="text-muted mb-4">Acumula puntos con tus compras y canjea recompensas exclusivas.</p>
        <div class="loyalty-grid" id="myCards"></div>
        <div id="noCards" class="text-center py-5" style="display:none;">
            <i class="bi bi-gift fs-1 text-muted"></i>
            <p class="text-muted mt-2">Aún no tienes tarjetas de fidelización.</p>
            <p class="text-muted">¡Realiza tu primera compra para comenzar a acumular puntos!</p>
        </div>
    </div>
    <div id="footerContainer"></div>
    <script src="/public/jquery/jquery.min.js"></script>
    <script src="/public/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="/public/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="/public/js/client_common.js"></script>
    <script src="/componente_ia/chat_widget.js"></script>
    <script>
        function formatCardNumber(id) {
            const padded = String(id || 0).padStart(8, '0');
            return `4318 0092 ${padded.slice(0, 4)} ${padded.slice(4)}`;
        }

        function getCardBackground(imagenTarjeta) {
            if (imagenTarjeta) {
                const url = `/public/assets/images/${encodeURIComponent(imagenTarjeta)}`;
                return `url('${url}')`;
            }
            return 'linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%)';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        $(document).ready(function () {
            $('#navbarContainer').load('/components/client_navbar.html', () => checkSession());
            $('#footerContainer').load('/components/client_footer.html');

            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('promo_registered') === '1') {
                const promoName = urlParams.get('promo_name') || 'Promoción';
                showToast(`Su tarjeta para "${promoName}" ha sido registrada exitosamente`, 'success');
                const newUrl = window.location.pathname;
                window.history.replaceState({}, document.title, newUrl);
            }

            $.get('/api/promotions/cards/my', function (r) {
                if (!r.data || r.data.length === 0) { $('#noCards').show(); return; }
                var html = '';
                r.data.forEach(function (card) {
                    var accumulated = card.puntos_acumulados || 0;
                    var required = card.puntos_requeridos || 0;

                    var stampsHtml = '<div class="punch-card-grid">';
                    for (var i = 1; i <= required; i++) {
                        var isReward = (i === required);
                        var isFilled = (i <= accumulated);

                        var slotClass = 'punch-slot';
                        if (isReward) slotClass += ' reward-slot';
                        if (isFilled) slotClass += ' filled';

                        var slotContent = '';
                        if (isReward) {
                            slotContent = isFilled ? '<i class="bi bi-gift-fill"></i>' : '<i class="bi bi-gift"></i>';
                        } else {
                            slotContent = i;
                        }

                        stampsHtml += '<div class="' + slotClass + '">' + slotContent + '</div>';
                    }
                    stampsHtml += '</div>';

                    var completedAlertHtml = '';
                    if (accumulated >= required) {
                        completedAlertHtml = '<div class="alert alert-success py-2 px-3 mb-2 text-center" style="font-size: 0.85rem; font-weight: 700; border-radius: 10px; color: #15803d; background-color: #f0fdf4; border-color: #bbf7d0;">' +
                            '🎉 ¡Promoción completada! Puede aplicar su promoción.' +
                            '</div>';
                    }

                    var bg = getCardBackground(card.imagen_tarjeta);
                    var cardNum = formatCardNumber(card.id);
                    var statusClass = card.canjeada ? 'redeemed-badge' : 'active-badge';
                    var statusText = card.canjeada ? 'Canjeada' : 'Activa';

                    html += '<div class="loyalty-card-wrapper fade-in-up">' +
                        '<div class="fidelity-card-physical" style="background: ' + bg + ';">' +
                            '<div class="card-meta-row">' +
                                '<span class="card-brand-logo">TRANSALCA</span>' +
                                '<span class="card-status-badge ' + statusClass + '">' + statusText + '</span>' +
                            '</div>' +
                            '<div class="card-meta-row mt-2">' +
                                '<div class="card-chip-gold"></div>' +
                                '<i class="bi bi-wifi card-contactless"></i>' +
                            '</div>' +
                            '<div class="card-number-display">' + cardNum + '</div>' +
                            '<div class="card-holder-row">' +
                                '<div>' +
                                    '<div class="card-holder-name">' + escapeHtml(card.cliente_nombre || 'N/A') + '</div>' +
                                    '<div class="card-holder-cedula">C.I. ' + escapeHtml(card.cliente_cedula_display || card.cliente_cedula || '-') + '</div>' +
                                    '</div>' +
                                '</div>' +
                            '</div>' +
                        '<div class="card-stamps-panel">' +
                            '<div class="d-flex justify-content-between align-items-center mb-1">' +
                                '<strong class="text-orange fs-6" style="font-weight:700;">' + escapeHtml(card.promo_nombre || card.promocion_nombre || 'Promoción') + '</strong>' +
                                '<span class="small text-muted" style="font-weight:600;">' + accumulated + ' / ' + required + ' Puntos</span>' +
                            '</div>' +
                            '<p class="small text-muted mb-2">' + escapeHtml(card.promo_descripcion || '') + '</p>' +
                            '<div class="small mb-2"><strong class="text-orange">Recompensa:</strong> ' + escapeHtml(card.recompensa || '-') + '</div>' +
                            completedAlertHtml +
                            stampsHtml +
                        '</div>' +
                    '</div>';
                });
                $('#myCards').html(html);
            });
        });
    </script>
</body>

</html>
