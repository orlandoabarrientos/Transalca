<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transalca - Mi Fidelización</title>
    <link href="/public/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/public/bootstrap/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/public/sweetalert2/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/public/css/styles.css">
    <link rel="stylesheet" href="/public/css/chat_widget.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="navbarContainer"></div>
    <div class="container py-4">
        <h3 class="fw-bold mb-4"><i class="bi bi-gift-fill me-2" style="color:var(--highlight);"></i>Mi Programa de Fidelización</h3>
        <p class="text-muted mb-4">Acumula puntos con tus compras y canjea recompensas exclusivas.</p>
        <div class="row g-4" id="myCards"></div>
        <div id="noCards" class="text-center py-5" style="display:none;">
            <i class="bi bi-gift fs-1 text-muted"></i>
            <p class="text-muted mt-2">Aún no tienes tarjetas de fidelización.</p>
            <p class="text-muted">¡Realiza tu primera compra para comenzar a acumular puntos!</p>
        </div>
    </div>
    <div id="footerContainer"></div>
    <script src="/public/jquery/jquery.min.js"></script>
    <script src="/public/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="/public/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="/public/js/admin_common.js"></script>
    <script src="/public/js/client_common.js"></script>
    <script src="/public/js/chat_widget.js"></script>
    <script>
    $(document).ready(function(){
        $('#navbarContainer').load('/components/client_navbar.html', () => checkSession());
        $.get('/api/promotions/cards/my',function(r){
            if(!r.data||r.data.length===0){$('#noCards').show();return;}
            var html='';
            r.data.forEach(function(card){
                var dots='';
                for(var i=0;i<card.puntos_requeridos;i++){
                    dots+='<div class="point-dot '+(i<card.puntos_actuales?'filled':'')+'"><i class="bi bi-check"></i></div>';
                }
                var gradient=card.canjeada?'linear-gradient(135deg,#00b894,#55efc4)':'linear-gradient(135deg,#e94560,#0f3460)';
                html+='<div class="col-md-6"><div class="loyalty-card" style="background:'+gradient+';"><div class="card-content"><div class="d-flex justify-content-between"><div><div class="card-title">'+card.promocion_nombre+'</div><div class="card-subtitle">TRANSALCA C.A.</div></div><div><i class="bi bi-'+(card.canjeada?'trophy-fill':'gem')+' fs-2"></i></div></div><div class="points-container">'+dots+'</div><div class="d-flex justify-content-between align-items-end"><div><div class="reward-text">🎁 Recompensa: '+card.recompensa+'</div><small>'+card.puntos_actuales+' / '+card.puntos_requeridos+' puntos</small></div>'+(card.canjeada?'<span class="badge bg-light text-success fw-bold">CANJEADA ✓</span>':'<span class="badge bg-light text-dark">Activa</span>')+'</div></div></div></div>';
            });
            $('#myCards').html(html);
        });
    });
    </script>
</body>
</html>
