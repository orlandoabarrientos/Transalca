<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/png" href="/public/img/logo.png">
    <link href="/public/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/public/bootstrap/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/public/sweetalert2/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/public/css/styles.css">
    <style>
        .scanner-reader {
            width: 100%;
            min-height: 260px;
            border: 1.5px dashed var(--border);
            border-radius: 12px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            overflow: hidden;
        }

        .scanner-mini-qr {
            width: 120px;
            height: 120px;
            border-radius: 10px;
            border: 1px solid var(--border);
            object-fit: contain;
            background: #fff;
        }

        .scanner-tag {
            font-size: 0.72rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--primary-soft);
            color: var(--primary-dark);
            display: inline-block;
        }

        .scanner-result-pre {
            background: #F8FAFC;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            font-size: 0.78rem;
            max-height: 260px;
            overflow: auto;
        }
    </style>
</head>

<body>
    <div id="navbarContainer"></div>

    <div class="container py-4">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div>
                <h3 class="fw-bold mb-1"><i class="bi bi-upc-scan me-2"></i>Modulo Escaner</h3>
                <p class="text-muted mb-0">Escanea codigos QR del sistema para promociones, validacion de facturas y
                    acciones operativas.</p>
            </div>
            <div class="scanner-tag" id="scannerUserType">Sesion activa</div>
        </div>

        <div class="row g-4">
            <div class="col-lg-7">
                <div class="card">
                    <div class="card-header"><span>Escanear QR</span></div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Codigo QR (texto o URL)</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="qrInput"
                                    placeholder="Ej: https://tu-dominio/scanner?qr=25">
                                <button class="btn btn-orange" id="btnProcessQr"><i
                                        class="bi bi-search me-1"></i>Procesar</button>
                            </div>
                        </div>
                        <div class="d-flex flex-wrap gap-2 mb-3">
                            <button class="btn btn-outline-orange" id="btnStartCamera"><i
                                    class="bi bi-camera-video me-1"></i>Iniciar camara</button>
                            <button class="btn btn-outline-secondary" id="btnStopCamera" disabled><i
                                    class="bi bi-stop-circle me-1"></i>Detener</button>
                        </div>
                        <div id="qrReader" class="scanner-reader mb-3">Camara lista para escanear</div>
                        <div class="card" id="scanResultCard" style="display:none;">
                            <div class="card-header"><span>Resultado del escaneo</span></div>
                            <div class="card-body" id="scanResultBody"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-5" id="employeeTools" style="display:none;">
                <div class="card mb-4">
                    <div class="card-header"><span>QR de Mesas</span></div>
                    <div class="card-body">
                        <div class="input-group mb-3">
                            <input type="text" class="form-control" id="mesaCodeInput"
                                placeholder="Codigo mesa (ej: MESA-01)">
                            <button class="btn btn-orange" id="btnCreateMesaQr"><i class="bi bi-plus-lg"></i></button>
                        </div>
                        <div id="tableQrList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footerContainer"></div>

    <script src="/public/jquery/jquery.min.js"></script>
    <script src="/public/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="/public/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="/public/js/admin_common.js"></script>
    <script src="/public/js/client_common.js"></script>
    <script src="https://unpkg.com/html5-qrcode" defer></script>
    <script src="/public/js/scanner.js"></script>
</body>

</html>
