<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo - Transalca C.A.</title>
    <meta name="description" content="Catalogo completo de repuestos, cauchos, lubricantes y servicios automotrices.">
    <link href="/public/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/public/bootstrap/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/public/css/styles.css" rel="stylesheet">
    <link href="/componente_ia/chat_widget.css" rel="stylesheet">
</head>
<body>
<div id="navbarContainer"></div>

<div class="container py-4">
    <div class="mb-4">
        <h3 class="fw-bold mb-1">Catalogo</h3>
        <p class="text-muted">Explora nuestros productos y servicios</p>
    </div>

    
    <div class="filter-bar">
        <div class="search-bar" style="max-width:280px;">
            <i class="bi bi-search"></i>
            <input type="text" class="form-control" id="searchInput" placeholder="Buscar producto..." oninput="filterProducts()">
        </div>
        <select class="form-select" id="filterCategory" onchange="filterProducts()"><option value="">Todas las categorias</option></select>
        <select class="form-select" id="filterBranch" onchange="filterProducts()"><option value="">Todas las sucursales</option></select>
        <select class="form-select" id="filterSort" onchange="filterProducts()">
            <option value="">Ordenar por</option><option value="price_asc">Precio: Menor a Mayor</option><option value="price_desc">Precio: Mayor a Menor</option><option value="name">Nombre A-Z</option>
        </select>
    </div>

    
    <div class="sucursal-selector" id="sucursalChips"></div>

    
    <ul class="nav nav-tabs mb-3"><li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#tabProducts">Productos</a></li><li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tabServices">Servicios</a></li></ul>
    <div class="tab-content">
        <div class="tab-pane fade show active" id="tabProducts">
            <div class="row g-3" id="productGrid"></div>
        </div>
        <div class="tab-pane fade" id="tabServices">
            <div class="row g-3" id="serviceGrid"></div>
        </div>
    </div>
</div>

<footer class="text-center py-4 mt-5" style="background:var(--bg-sidebar);color:var(--text-sidebar);">
    <p class="mb-0">&copy; 2026 Transalca C.A. - Todos los derechos reservados</p>
</footer>

<script src="/public/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/public/jquery/jquery.min.js"></script>
<script src="/public/js/admin_common.js"></script>
<script src="/public/js/client_common.js"></script>
<script>
let allProducts = [];
let allServices = [];

$(document).ready(function() {
    $('#navbarContainer').load('/components/client_navbar.html', () => checkSession());
    loadCatalog();
});

async function loadCatalog() {
    try {
        const cats = await fetch('/api/categories/active').then(r => r.json());
        const sel = document.getElementById('filterCategory');
        (cats.data||[]).forEach(c => sel.innerHTML += `<option value="${c.nombre}">${c.nombre}</option>`);
    } catch(e) {}
    try {
        const branches = await fetch('/api/sucursales/active').then(r => r.json());
        const sel = document.getElementById('filterBranch');
        const chips = document.getElementById('sucursalChips');
        chips.innerHTML = '<span class="sucursal-chip active" onclick="selectBranch(this,\'\')">Todas</span>';
        (branches.data||[]).forEach(b => {
            sel.innerHTML += `<option value="${b.id}">${b.nombre}</option>`;
            chips.innerHTML += `<span class="sucursal-chip" onclick="selectBranch(this,'${b.id}')">${b.nombre}</span>`;
        });
    } catch(e) {}

    try {
        const res = await fetch('/api/products/active').then(r => r.json());
        allProducts = res.data || [];
        renderProducts(allProducts);
    } catch(e) {}

    try {
        const res = await fetch('/api/services/active').then(r => r.json());
        allServices = res.data || [];
        renderServices(allServices);
    } catch(e) {}

    const params = new URLSearchParams(window.location.search);
    if (params.get('category')) {
        document.getElementById('filterCategory').value = params.get('category');
        filterProducts();
    }
}

function selectBranch(el, branchId) {
    document.querySelectorAll('.sucursal-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('filterBranch').value = branchId;
    filterProducts();
}

function filterProducts() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const cat = document.getElementById('filterCategory').value;
    const branch = document.getElementById('filterBranch').value;
    const sort = document.getElementById('filterSort').value;

    let filtered = allProducts.filter(p => {
        if (q && !p.nombre.toLowerCase().includes(q) && !(p.codigo||'').toLowerCase().includes(q)) return false;
        if (cat && p.categoria != cat) return false;
        if (branch && p.sucursal_id && p.sucursal_id != branch) return false;
        return true;
    });

    if (sort === 'price_asc') filtered.sort((a,b) => a.precio - b.precio);
    else if (sort === 'price_desc') filtered.sort((a,b) => b.precio - a.precio);
    else if (sort === 'name') filtered.sort((a,b) => a.nombre.localeCompare(b.nombre));

    renderProducts(filtered);

    let filteredS = allServices.filter(s => {
        if (q && !s.nombre.toLowerCase().includes(q)) return false;
        if (branch && s.sucursal_id && s.sucursal_id != branch) return false;
        return true;
    });
    renderServices(filteredS);
}

function renderProducts(products) {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '';
    products.forEach(p => {
        const img = p.imagen ? `<img src="/public/assets/images/${p.imagen}" alt="${p.nombre}">` : `<div class="no-image"><i class="bi bi-image"></i><span>Sin imagen</span></div>`;
        grid.innerHTML += `<div class="col-6 col-md-4 col-lg-3 fade-in-up"><div class="product-card">
            <div class="product-img">${img}</div>
            <div class="product-info">
                <div class="product-category">${p.categoria_nombre || ''}</div>
                <div class="product-name">${p.nombre}</div>
                <div class="product-price">$${formatCurrency(p.precio)}</div>
                ${p.sucursal_nombre ? `<div class="product-branch"><i class="bi bi-geo-alt"></i>${p.sucursal_nombre}</div>` : ''}
            </div>
            <button class="btn-add-cart" onclick="addToCart('${p.codigo}')"><i class="bi bi-cart-plus me-1"></i>Agregar</button>
        </div></div>`;
    });
    if (!products.length) grid.innerHTML = '<div class="col-12"><div class="empty-state"><i class="bi bi-search"></i><p>No se encontraron productos</p></div></div>';
}

function renderServices(services) {
    const grid = document.getElementById('serviceGrid');
    grid.innerHTML = '';
    const icons = { alineacion: 'bi-rulers', rotacion: 'bi-arrow-repeat', balanceo: 'bi-speedometer', cambio_aceite: 'bi-droplet-fill', general: 'bi-wrench-adjustable' };
    services.forEach(s => {
        grid.innerHTML += `<div class="col-6 col-md-4 col-lg-3 fade-in-up"><div class="card p-3 text-center" style="cursor:pointer;" onclick="addToCart(${s.id},'servicio')">
            <i class="bi ${icons[s.tipo] || 'bi-wrench'}" style="font-size:2rem;color:var(--primary);"></i>
            <h6 class="fw-bold mt-2 mb-1">${s.nombre}</h6>
            <span class="fw-bold" style="color:var(--primary);">$${formatCurrency(s.precio)}</span>
            ${s.sucursal_nombre ? `<small class="d-block text-muted mt-1"><i class="bi bi-geo-alt"></i> ${s.sucursal_nombre}</small>` : ''}
        </div></div>`;
    });
    if (!services.length) grid.innerHTML = '<div class="col-12"><div class="empty-state"><i class="bi bi-wrench"></i><p>No se encontraron servicios</p></div></div>';
}
</script>
<script src="/componente_ia/chat_widget.js"></script>
</body>
</html>
