<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/png" href="/public/img/logo.png">
    <link href="/public/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/public/css/styles.css" rel="stylesheet">
</head>

<body>
    <div class="container py-5 text-center">
        <h5 class="fw-bold mb-2">Redirigiendo al modulo Escaner...</h5>
        <p class="text-muted mb-0">Si no redirige automaticamente, use el boton.</p>
        <a id="manualRedirect" href="/scanner" class="btn btn-orange mt-3">Abrir Escaner</a>
    </div>
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var id = params.get('id') || '';
            var target = '/scanner' + (id ? ('?qr=' + encodeURIComponent(id)) : '');
            var link = document.getElementById('manualRedirect');
            if (link) link.href = target;
            window.location.replace(target);
        })();
    </script>
</body>

</html>
