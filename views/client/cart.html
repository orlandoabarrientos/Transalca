<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transalca - Mi Carrito</title>
    <link href="/public/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/public/bootstrap/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/public/sweetalert2/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/public/css/styles.css">
    <link rel="stylesheet" href="/public/css/chat_widget.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="navbarContainer"></div>
    <div class="container py-4">
        <h3 class="fw-bold mb-4"><i class="bi bi-cart3 me-2"></i>Mi Carrito</h3>
        <div class="row">
            <div class="col-md-8">
                <div class="card-custom mb-4">
                    <div class="card-body" id="cartItems"></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-custom" style="position:sticky;top:80px;">
                    <div class="card-header"><span>Resumen del Pedido</span></div>
                    <div class="card-body">
                        <div class="d-flex justify-content-between mb-2"><span>Subtotal:</span><span id="subtotal">$0.00</span></div>
                        <hr>
                        <div class="d-flex justify-content-between mb-3"><strong>Total:</strong><strong id="total" class="fs-4" style="color:var(--highlight);">$0.00</strong></div>
                        <form id="checkoutForm" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Método de Pago</label>
                                <select class="form-select" id="metodoPago">
                                    <option value="transferencia">Transferencia Bancaria</option>
                                    <option value="pago_movil">Pago Móvil</option>
                                    <option value="efectivo">Efectivo</option>
                                    <option value="zelle">Zelle</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Comprobante de Pago</label>
                                <input type="file" class="form-control" id="comprobante" accept="image/*" required>
                                <small class="text-muted">Sube la captura de tu comprobante de pago</small>
                            </div>
                            <button type="submit" class="btn btn-success-custom w-100 py-3" id="btnCheckout">
                                <i class="bi bi-bag-check-fill me-2"></i>Finalizar Compra
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="footerContainer"></div>
    <script src="/public/jquery/jquery.min.js"></script>
    <script src="/public/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="/public/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="/public/js/admin_common.js"></script>
    <script src="/public/js/client_common.js"></script>
    <script src="/public/js/chat_widget.js"></script>
    <script>
    $(document).ready(function(){
        $('#navbarContainer').load('/components/client_navbar.html', () => checkSession());
        loadCart();
        $('#checkoutForm').on('submit',function(e){
            e.preventDefault();
            var fd=new FormData();
            fd.append('metodo_pago',$('#metodoPago').val());
            if($('#comprobante')[0].files[0]) fd.append('comprobante',$('#comprobante')[0].files[0]);
            $('#btnCheckout').prop('disabled',true).html('<span class="spinner-border spinner-border-sm me-2"></span>Procesando...');
            $.ajax({url:'/api/orders/checkout',type:'POST',data:fd,processData:false,contentType:false,
                success:function(r){
                    Swal.fire({icon:'success',title:'¡Pedido realizado!',html:'<p>Tu orden <strong>#'+r.id+'</strong> ha sido creada.</p><p>Revisaremos tu comprobante de pago y te notificaremos por correo.</p>',confirmButtonColor:'#e94560'}).then(function(){window.location.href='/client/my_orders';});
                },
                error:function(x){$('#btnCheckout').prop('disabled',false).html('<i class="bi bi-bag-check-fill me-2"></i>Finalizar Compra');showError(x.responseJSON?x.responseJSON.message:'Error al procesar');}
            });
        });
    });
    function loadCart(){
        $.get('/api/orders/cart',function(r){
            var html='';var total=0;
            if(!r.data||r.data.length===0){
                html='<div class="text-center py-5"><i class="bi bi-cart-x fs-1 text-muted"></i><p class="text-muted mt-2">Tu carrito está vacío</p><a href="/client/catalog" class="btn btn-primary-custom">Ver Catálogo</a></div>';
                $('#btnCheckout').prop('disabled',true);
            } else {
                r.data.forEach(function(item){
                    var subtotal=item.precio*item.cantidad;total+=subtotal;
                    html+='<div class="d-flex justify-content-between align-items-center py-3 border-bottom"><div class="d-flex align-items-center gap-3"><img src="/public/assets/images/'+(item.imagen||'no-image.png')+'" style="width:60px;height:60px;object-fit:cover;border-radius:8px;" onerror="this.src=\'/public/assets/images/no-image.png\'"><div><h6 class="mb-0 fw-bold">'+item.nombre+'</h6><small class="text-muted">'+item.tipo+'</small></div></div><div class="d-flex align-items-center gap-3"><div class="input-group input-group-sm" style="width:120px;"><button class="btn btn-outline-secondary" onclick="updateQty('+item.cart_id+','+(item.cantidad-1)+')">-</button><input type="text" class="form-control text-center" value="'+item.cantidad+'" readonly><button class="btn btn-outline-secondary" onclick="updateQty('+item.cart_id+','+(item.cantidad+1)+')">+</button></div><span class="fw-bold">$'+subtotal.toFixed(2)+'</span><button class="btn btn-sm btn-outline-danger" onclick="removeItem('+item.cart_id+')"><i class="bi bi-trash"></i></button></div></div>';
                });
            }
            $('#cartItems').html(html);
            $('#subtotal').text('$'+total.toFixed(2));
            $('#total').text('$'+total.toFixed(2));
        });
    }
    function updateQty(cartId,qty){
        if(qty<1){removeItem(cartId);return;}
        $.ajax({url:'/api/orders/cart/'+cartId+'/update',type:'PUT',contentType:'application/json',data:JSON.stringify({cantidad:qty}),success:function(){loadCart();updateCartBadge();}});
    }
    function removeItem(cartId){$.ajax({url:'/api/orders/cart/'+cartId+'/remove',type:'DELETE',success:function(){loadCart();updateCartBadge();}});}
    </script>
</body>
</html>
