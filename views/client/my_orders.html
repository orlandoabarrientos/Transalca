<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/png" href="/public/img/logo.png">
    <link href="/public/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/public/bootstrap/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/public/sweetalert2/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/public/css/styles.css">
    <link rel="stylesheet" href="/componente_ia/chat_widget.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div id="navbarContainer"></div>
    <div class="container py-4" style="min-height:420px;">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
            <h3 class="fw-bold mb-0"><i class="bi bi-bag-check me-2"></i>Mis Pedidos</h3>
            <input type="search" class="form-control auto-table-search" id="orderSearch" placeholder="Buscar pedido..." style="max-width:320px;">
        </div>
        <div id="ordersList"><div class="text-center py-5"><span class="spinner-border text-primary"></span><p class="text-muted mt-2">Cargando pedidos...</p></div></div>
    </div>
    <div id="footerContainer"></div>
    <div class="modal fade modal-custom" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Detalle del Pedido</h5><button type="button" class="btn-close"
                        data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="detailBody"></div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="invoiceQrModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">QR de Factura</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <div id="invoiceQrLoader" class="py-3"><span class="spinner-border text-primary"></span><p class="text-muted mt-2 mb-0">Cargando QR...</p></div>
                    <img id="invoiceQrPreview" src="" alt="QR Factura" class="img-fluid rounded shadow-sm mb-2">
                    <small class="text-muted d-block">Escanee este QR desde el modulo Escaner.</small>
                </div>
            </div>
        </div>
    </div>
    <script src="/public/jquery/jquery.min.js"></script>
    <script src="/public/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="/public/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="/public/js/client_common.js"></script>
    <script src="/componente_ia/chat_widget.js"></script>
    <script>
        $(document).ready(function () {
            $('#navbarContainer').load('/components/client_navbar.html', () => checkSession());
            $('#footerContainer').load('/components/client_footer.html');
            $.get('/api/orders/my-orders', function (r) {
                var html = '';
                if (!r.data || r.data.length === 0) {
                    html = '<div class="text-center py-5 text-muted"><i class="bi bi-bag-x fs-1"></i><p>No tienes pedidos aún</p><a href="/client/catalog" class="btn btn-primary-custom">Ir al Catálogo</a></div>';
                } else {
                    r.data.forEach(function (o) {
                        var state = String(o.estado || '').toLowerCase();
                        var approved = ['aprobada', 'aprobado', 'verificado', 'verificada', 'pagado', 'pagada'].includes(state);
                        var badge = approved ? 'badge-active' : state === 'pendiente' ? 'badge-pending' : 'badge-inactive';
                        var icon = approved ? 'bi-check-circle-fill text-success' : state === 'pendiente' ? 'bi-clock-fill text-warning' : 'bi-x-circle-fill text-danger';
                        var qrButton = approved ? '<button class="btn btn-sm btn-outline-orange" onclick="viewInvoiceQr(' + o.id + ', this)"><i class="bi bi-upc-scan me-1"></i>QR Factura</button>' : '';
                        html += '<div class="card-custom mb-3 order-card"><div class="card-body"><div class="d-flex justify-content-between align-items-center"><div><h6 class="fw-bold mb-1">Pedido #' + o.id + '</h6><small class="text-muted">' + formatDateLocal(o.fecha) + ' | ' + (o.metodo_pago || '') + '</small></div><div class="text-end"><span class="badge-status ' + badge + '"><i class="bi ' + icon + ' me-1"></i>' + o.estado + '</span><h5 class="fw-bold mt-1" style="color:var(--highlight);" data-usd-price="' + o.total + '">' + formatUsdBs(o.total) + '</h5></div></div><div class="d-flex gap-2 mt-2"><button class="btn btn-sm btn-outline-primary" onclick="viewOrder(' + o.id + ', this)"><i class="bi bi-eye me-1"></i>Ver Detalle</button>' + qrButton + '</div></div></div>';
                    });
                }
                $('#ordersList').html(html);
            }).fail(function () {
                $('#ordersList').html('<div class="text-center py-5 text-muted"><i class="bi bi-exclamation-triangle fs-1"></i><p>No se pudieron cargar los pedidos.</p></div>');
            });
            $('#orderSearch').on('input', function () {
                var term = this.value.trim().toLowerCase();
                document.querySelectorAll('.order-card').forEach(function (card) {
                    card.style.display = !term || card.textContent.toLowerCase().includes(term) ? '' : 'none';
                });
            });
        });
        function viewOrder(id, button) {
            setButtonLoading(button, true, 'Cargando...');
            $.get('/api/orders/' + id, function (r) {
                setButtonLoading(button, false);
                var d = r.data;
                var html = '<div class="mb-3"><strong>Estado:</strong> ' + d.estado + ' | <strong>Fecha:</strong> ' + formatDateLocal(d.fecha) + '</div><table class="table table-sm"><thead><tr><th>Item</th><th>Cantidad</th><th>Precio</th><th>Subtotal</th></tr></thead><tbody>';
                (d.detalles || []).forEach(function (dt) {
                    var itemName = dt.item_nombre || dt.nombre || '-';
                    var price = parseFloat(dt.precio_unitario || dt.precio || 0);
                    var subtotal = parseFloat(dt.subtotal || (dt.cantidad * price));
                    html += '<tr><td>' + escapeHtml(itemName) + '</td><td>' + (dt.cantidad || 0) + '</td><td data-usd-price="' + price + '">' + formatUsdBs(price) + '</td><td data-usd-price="' + subtotal + '">' + formatUsdBs(subtotal) + '</td></tr>';
                });
                html += '</tbody></table>';
                if (d.comprobante && d.comprobante.imagen_url) {
                    html += '<div class="mt-3"><strong>Comprobante:</strong><br><img src="/public/assets/comprobantes/' + escapeHtml(d.comprobante.imagen_url) + '" class="img-fluid rounded border mt-2" style="max-height:260px;object-fit:contain;" alt="Comprobante"></div>';
                }
                html += '<h5 class="text-end" data-usd-price="' + d.total + '">Total: ' + formatUsdBs(d.total) + '</h5>';
                $('#detailBody').html(html); new bootstrap.Modal(document.getElementById('detailModal')).show();
            }).fail(function () {
                setButtonLoading(button, false);
                showToast('No se pudo cargar el pedido', 'error');
            });
        }
        function viewInvoiceQr(orderId, button) {
            setButtonLoading(button, true, 'Cargando...');
            var img = document.getElementById('invoiceQrPreview');
            var loader = document.getElementById('invoiceQrLoader');
            if (loader) loader.style.display = '';
            img.style.display = 'none';
            img.src = '/api/scanner/invoice/' + orderId + '/image?t=' + new Date().getTime();
            img.onload = function () { if (loader) loader.style.display = 'none'; img.style.display = ''; setButtonLoading(button, false); };
            img.onerror = function () { if (loader) loader.style.display = 'none'; setButtonLoading(button, false); showToast('El QR de factura solo esta disponible cuando el pago esta aprobado.', 'warning'); };
            new bootstrap.Modal(document.getElementById('invoiceQrModal')).show();
        }
        function formatMoney(value) {
            return parseFloat(value || 0).toLocaleString('es-VE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        function formatDateLocal(value) {
            if (!value) return '-';
            return new Date(value).toLocaleString('es-VE');
        }
    </script>
</body>

</html>
