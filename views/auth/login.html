<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion - Transalca C.A.</title>
    <meta name="description" content="Inicia sesion en Transalca C.A. - Tu tienda de repuestos y servicios automotrices">
    <link href="/public/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/public/bootstrap/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/public/sweetalert2/sweetalert2.min.css" rel="stylesheet">
    <link href="/public/css/styles.css" rel="stylesheet">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="brand-title">
            <h2>TRANSALCA</h2>
            <p>Repuestos y Servicios Automotrices</p>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Correo Electronico <span class="required">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="loginEmail" name="loginEmail" placeholder="correo@ejemplo.com" required>
                </div>
                <div class="invalid-feedback"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Contrasena <span class="required">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="loginPassword" name="loginPassword" placeholder="••••••••" required>
                </div>
                <div class="invalid-feedback"></div>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-4">
                <a href="/auth/recover" class="text-decoration-none" style="font-size:0.82rem;color:var(--primary);">¿Olvido su contrasena?</a>
            </div>
            <button type="submit" class="btn-login mb-3">Iniciar Sesion</button>
            <p class="text-center" style="font-size:0.85rem;color:var(--text-secondary);">
                ¿No tiene cuenta? <a href="/auth/register" style="color:var(--primary);font-weight:600;">Registrarse</a>
            </p>
            <hr>
            <p class="text-center mb-0">
                <a href="/client/home" class="btn btn-sm btn-outline-orange"><i class="bi bi-shop me-1"></i>Ver Catalogo sin registrarse</a>
            </p>
        </form>
    </div>
</div>
<script src="/public/jquery/jquery.min.js"></script>
<script src="/public/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/public/sweetalert2/sweetalert2.all.min.js"></script>
<script src="/public/js/admin_common.js"></script>
<script src="/public/js/auth.js"></script>
</body>
</html>
