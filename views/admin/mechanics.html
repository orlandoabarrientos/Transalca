<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/png" href="/public/img/logo.png">
    <link href="/public/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/public/bootstrap/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/public/css/styles.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
    <div id="sidebarContainer"></div>
    <div class="main-content">
        <div id="navbarContainer"></div>
        <div class="content-area">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0">Mecanicos</h4>
                <button class="btn btn-orange" onclick="openModal()"><i class="bi bi-plus-lg me-2"></i>Nuevo Mecanico</button>
            </div>
            <div class="card">
                <div class="card-body p-0">
                    <table class="table mb-0">
                        <thead><tr><th>Nombre / C.I.</th><th>Especialidad</th><th>Telefono</th><th>Estado</th><th>Acciones</th></tr></thead>
                        <tbody id="mechanicBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="mechanicModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title" id="modalTitle">Nuevo Mecanico</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="mechanicForm">
                    <input type="hidden" id="mechanicOldCedula">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Nombre <span class="required">*</span></label>
                            <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Ej: Carlos">
                            <div class="invalid-feedback"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Apellido <span class="required">*</span></label>
                            <input type="text" class="form-control" id="apellido" name="apellido" placeholder="Ej: Silva">
                            <div class="invalid-feedback"></div>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Cédula <span class="required">*</span></label>
                            <input type="text" class="form-control" id="cedula" name="cedula" placeholder="Ej: V-12345678">
                            <div class="invalid-feedback"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Teléfono</label>
                            <input type="text" class="form-control" id="telefono" name="telefono" placeholder="Ej: 0414-1234567">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Especialidad</label>
                        <input type="text" class="form-control" id="especialidad" name="especialidad" placeholder="Ej: Alineacion, Balanceo">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Foto del Mecánico (Opcional)</label>
                        <input type="file" class="form-control" id="foto_perfil" name="foto_perfil" accept="image/png, image/jpeg, image/jpg">
                        <small class="text-muted">Si se sube, reemplazará la foto de perfil del usuario empleado.</small>
                    </div>
                </form>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button type="button" class="btn btn-orange" onclick="saveData()">Guardar</button></div>
        </div>
    </div>
</div>
<script src="/public/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/public/jquery/jquery.min.js"></script>
<script src="/public/js/admin_common.js"></script>
<script src="/public/js/mechanics.js"></script>
</body>
</html>
