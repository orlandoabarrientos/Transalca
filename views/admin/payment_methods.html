<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transalca Admin | Gestionar Métodos de Pago</title>
    <link rel="icon" type="image/png" href="/public/img/logo.png">
    <link href="/public/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/public/bootstrap/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/public/css/styles.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
    <div id="sidebarContainer"></div>
    <div class="main-content">
        <div id="navbarContainer"></div>
        <div class="content-area">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0">Gestionar Métodos de Pago</h4>
                <button class="btn btn-orange" onclick="openPaymentMethodModal()"><i class="bi bi-plus-circle me-2"></i>Registrar Método de Pago</button>
            </div>
            <div class="card-custom mb-3">
                <div class="card-body">
                    <input type="text" class="form-control" id="paymentMethodSearch" placeholder="Buscar por nombre, datos o usuario...">
                </div>
            </div>
            <div class="card">
                <div class="card-body p-0">
                    <table class="table mb-0">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Datos</th>
                                <th>Crédito</th>
                                <th>Moneda</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="paymentMethodBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="paymentMethodModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="paymentMethodModalTitle">Registrar Método de Pago</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="paymentMethodForm">
                    <input type="hidden" id="paymentMethodId">
                    <div class="mb-3">
                        <label class="form-label">Nombre <span class="required">*</span></label>
                        <input type="text" class="form-control" id="nombre" name="nombre" maxlength="100">
                        <div class="invalid-feedback"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Datos <span class="required">*</span></label>
                        <textarea class="form-control" id="datos_pago" name="datos_pago" rows="3" maxlength="80"></textarea>
                        <div class="invalid-feedback"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Moneda <span class="required">*</span></label>
                        <select class="form-select" id="moneda" name="moneda" required>
                            <option value="usd">Dólares (usd)</option>
                            <option value="bs">Bolívares (bs)</option>
                        </select>
                        <div class="invalid-feedback"></div>
                    </div>
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="permite_credito" name="permite_credito">
                        <label class="form-check-label" for="permite_credito">Permite compras a crédito de empresas</label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-orange" id="btnSavePaymentMethod" onclick="savePaymentMethod()"><i class="bi bi-check-circle me-1"></i>Guardar</button>
            </div>
        </div>
    </div>
</div>
<script src="/public/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/public/jquery/jquery.min.js"></script>
<script src="/public/js/admin_common.js?v=2"></script>
<script src="/public/js/payment_methods.js?v=2"></script>
</body>
</html>
