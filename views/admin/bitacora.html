<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transalca Admin | Gestionar Bitácora</title>
    <link rel="icon" type="image/png" href="/public/img/transalca-logo.png">
    <link href="/public/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/public/bootstrap/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/public/css/styles.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
    <div id="sidebarContainer"></div>
    <div class="main-content">
        <div id="navbarContainer"></div>
        <div class="content-area">
            <div class="mb-4"><h4 class="fw-bold mb-0">Gestionar Bitácora</h4></div>
            <div class="filter-bar">
                <input type="text" class="form-control" id="searchBit" placeholder="Buscar..." oninput="searchLogs()">
                <input type="date" class="form-control" id="dateStart">
                <input type="date" class="form-control" id="dateEnd">
                <button class="btn btn-outline-orange btn-sm" onclick="filterByDate()"><i class="bi bi-funnel me-1"></i>Filtrar</button>
            </div>
            <div class="card">
                <div class="card-body p-0">
                    <table class="table mb-0">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Usuario</th>
                                <th>Acción</th>
                                <th>Módulo</th>
                                <th class="text-center">Detalle</th>
                                <th>IP</th>
                            </tr>
                        </thead>
                        <tbody id="bitBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="bitModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Detalle del cambio</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="bitDetalle" class="mb-4"></div>
                <h6 class="fw-bold mb-2"><i class="bi bi-clock-history me-1"></i>Últimas 10 acciones de <span id="bitUsuarioHistorial"></span></h6>
                <div id="bitUltimos" style="max-height:320px;overflow-y:auto;"></div>
            </div>
        </div>
    </div>
</div>
<script src="/public/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/public/jquery/jquery.min.js"></script>
<script src="/public/js/admin_common.js"></script>
<script src="/public/js/bitacora.js"></script>
</body>
</html>
