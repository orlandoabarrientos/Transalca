<!DOCTYPE html>
<html lang="es">
<head>

    <title>Transalca Admin | Dashboard</title>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="/public/img/transalca-logo.png">
    <link href="/public/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/public/bootstrap/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/public/css/styles.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
    <div id="sidebarContainer"></div>
    <div class="main-content">
        <div id="navbarContainer"></div>
        <div class="content-area">
            <div class="mb-4">
                <h4 class="fw-bold mb-1">Dashboard</h4>
                <p class="text-muted mb-0" style="font-size:0.85rem;">Resumen general del sistema</p>
            </div>


            <div class="row g-3 mb-4">
                <div class="col-sm-6 col-lg-3">
                    <div class="stat-card">
                        <div class="stat-icon orange"><i class="bi bi-box-seam-fill"></i></div>
                        <div>
                            <div class="stat-value" id="totalProducts">0</div>
                            <div class="stat-label">Productos</div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-lg-3">
                    <div class="stat-card">
                        <div class="stat-icon green"><i class="bi bi-cart-check-fill"></i></div>
                        <div>
                            <div class="stat-value" id="totalOrders">0</div>
                            <div class="stat-label">Ordenes</div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-lg-3">
                    <div class="stat-card">
                        <div class="stat-icon blue"><i class="bi bi-people-fill"></i></div>
                        <div>
                            <div class="stat-value" id="totalClients">0</div>
                            <div class="stat-label">Clientes</div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-lg-3">
                    <div class="stat-card">
                        <div class="stat-icon red"><i class="bi bi-exclamation-triangle-fill"></i></div>
                        <div>
                            <div class="stat-value" id="pendingPayments">0</div>
                            <div class="stat-label">Pagos Pendientes</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-3">

                <div class="col-lg-8">
                    <div class="card">
                        <div class="card-header">
                            <span><i class="bi bi-clock-history me-2"></i>Ordenes Recientes</span>
                            <a href="/admin/orders_sales" class="btn btn-sm btn-outline-orange">Ver todas</a>
                        </div>
                        <div class="card-body p-0">
                            <table class="table mb-0">
                                <thead>
                                    <tr><th>ID</th><th>Cliente</th><th>Total</th><th>Estado</th><th>Fecha</th></tr>
                                </thead>
                                <tbody id="recentOrders">
                                    <tr><td colspan="5" class="text-center py-4"><div class="empty-state"><i class="bi bi-cart"></i><p>Sin ordenes recientes</p></div></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>


                <div class="col-lg-4">
                    <div class="card">
                        <div class="card-header"><span><i class="bi bi-lightning-fill me-2"></i>Acciones Rapidas</span></div>
                        <div class="card-body">
                            <div class="d-grid gap-2">
                                <a href="/admin/products" class="btn btn-outline-orange"><i class="bi bi-box-seam me-2"></i>Gestionar Productos</a>
                                <a href="/admin/inventory" class="btn btn-outline-orange"><i class="bi bi-archive me-2"></i>Gestionar R. Stock</a>
                                <a href="/admin/payments" class="btn btn-outline-orange"><i class="bi bi-credit-card me-2"></i>Ver Pagos Pendientes</a>
                                <a href="/admin/sucursales" class="btn btn-outline-orange"><i class="bi bi-building me-2"></i>Sucursales</a>
                                <a href="/admin/reports" class="btn btn-outline-orange"><i class="bi bi-graph-up me-2"></i>Reportes</a>
                            </div>
                        </div>
                    </div>
                    <div class="card mt-3">
                        <div class="card-header"><span><i class="bi bi-building me-2"></i>Sucursales Activas</span></div>
                        <div class="card-body" id="branchList">
                            <p class="text-muted text-center">Cargando...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/public/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/public/jquery/jquery.min.js"></script>
<script src="/public/js/admin_common.js"></script>
<script src="/public/js/pages/admin_dashboard.js"></script>
</body>
</html>
