<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transalca Admin | Gestionar R. Stock de producto</title>
    <link rel="icon" type="image/png" href="/public/img/transalca-logo.png">
    <link href="/public/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/public/bootstrap/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/public/css/styles.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
    <div id="sidebarContainer"></div>
    <div class="main-content">
        <div id="navbarContainer"></div>
        <div class="content-area">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0">Gestionar R. Stock de producto</h4>
            </div>

            <div class="filter-bar">
                <label class="form-label mb-0 fw-bold" style="font-size:0.8rem;">Sucursal:</label>
                <select class="form-select" id="filterSucursal" onchange="loadStock(1)"></select>
                <label class="form-label mb-0 fw-bold ms-3" style="font-size:0.8rem;">Buscar:</label>
                <input type="text" class="form-control" id="searchStock" placeholder="Buscar producto, codigo o sucursal..." oninput="scheduleStockSearch()">
            </div>

            <div class="card mb-3">
                <div class="card-body p-0">
                    <table class="table mb-0">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Codigo</th>
                                <th>Sucursal</th>
                                <th>R. Stock</th>
                                <th>R. Stock min.</th>
                                <th>Alerta</th>
                            </tr>
                        </thead>
                        <tbody id="stockBody"></tbody>
                    </table>
                </div>
            </div>
            <div class="d-flex justify-content-between align-items-center px-2 mb-4">
                <div class="d-flex align-items-center gap-3">
                    <div class="text-muted small" id="stockPaginationInfo">Mostrando 0 de 0 registros</div>
                    <div class="d-flex align-items-center gap-1">
                        <span class="text-muted small" style="white-space: nowrap; font-size: 0.8rem;">Mostrar:</span>
                        <select class="form-select form-select-sm" id="stockPerPageSelect" style="width: auto; font-size: 0.75rem; padding: 0.2rem 1.6rem 0.2rem 0.4rem; height: 1.8rem; border-color: rgba(233, 93, 15, 0.2); border-radius: 4px;">
                            <option value="10">10</option>
                            <option value="20">20</option>
                            <option value="30" selected>30</option>
                        </select>
                    </div>
                </div>
                <nav aria-label="Navegacion de stock">
                    <ul class="pagination pagination-sm mb-0 animate-fade-in" id="stockPaginationControls">
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<script src="/public/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/public/jquery/jquery.min.js"></script>
<script src="/public/js/admin_common.js"></script>
<script src="/public/js/inventory.js"></script>
</body>
</html>
