<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/png" href="/public/img/logo.png">
    <link href="/public/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/public/bootstrap/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/public/css/styles.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
    <div id="sidebarContainer"></div>
    <div class="main-content">
        <div id="navbarContainer"></div>
        <div class="content-area">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0">Gestionar Stock de Productos</h4>
                <button class="btn btn-orange" onclick="openModal()"><i class="bi bi-plus-lg me-2"></i>Nueva Orden de Compra</button>
            </div>
            
            <div class="filter-bar">
                <label class="form-label mb-0 fw-bold" style="font-size:0.8rem;">Sucursal:</label>
                <select class="form-select" id="filterSucursal" onchange="loadStock()"></select>
                <label class="form-label mb-0 fw-bold ms-3" style="font-size:0.8rem;">Buscar:</label>
                <input type="text" class="form-control" id="searchStock" placeholder="Buscar producto..." oninput="filterTable()">
            </div>

            
            <ul class="nav nav-tabs mb-3" role="tablist">
                <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#tabStock">Stock Actual</a></li>
                <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tabOrders">Historial de Ordenes</a></li>
            </ul>
            <div class="tab-content">
                <div class="tab-pane fade show active" id="tabStock">
                    <div class="card">
                        <div class="card-body p-0">
                            <table class="table mb-0">
                                <thead>
                                    <tr><th>Producto</th><th>Codigo</th><th>Sucursal</th><th>Stock</th><th>Stock Min</th><th>Alerta</th></tr>
                                </thead>
                                <tbody id="stockBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="tab-pane fade" id="tabOrders">
                    <div class="card">
                        <div class="card-body p-0">
                            <table class="table mb-0">
                                <thead>
                                    <tr><th>ID</th><th>Proveedor</th><th>Sucursal</th><th>Solicitante</th><th>Total</th><th>Fecha</th><th>Estado</th></tr>
                                </thead>
                                <tbody id="orderBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<div class="modal fade" id="inventoryModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Nueva Orden de Compra</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="inventoryForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Proveedor <span class="required">*</span></label>
                            <select class="form-select" id="proveedor_rif" name="proveedor_rif"><option value="">Seleccione</option></select>
                            <div class="invalid-feedback"></div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Sucursal <span class="required">*</span></label>
                            <select class="form-select" id="sucursal_id" name="sucursal_id"></select>
                            <div class="invalid-feedback"></div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Producto <span class="required">*</span></label>
                            <select class="form-select" id="producto_codigo" name="producto_codigo"><option value="">Seleccione</option></select>
                            <div class="invalid-feedback"></div>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Cantidad <span class="required">*</span></label>
                            <input type="number" class="form-control" id="cantidad" name="cantidad" min="1" value="1">
                            <div class="invalid-feedback"></div>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Precio Unitario</label>
                            <input type="number" class="form-control" id="precio_unitario" name="precio_unitario" step="0.01" min="0">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Observaciones</label>
                        <textarea class="form-control" id="observaciones" name="observaciones" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button type="button" class="btn btn-orange" onclick="saveOrder()">Crear Orden</button></div>
        </div>
    </div>
</div>

<script src="/public/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/public/jquery/jquery.min.js"></script>
<script src="/public/js/admin_common.js"></script>
<script src="/public/js/inventory.js"></script>
</body>
</html>
