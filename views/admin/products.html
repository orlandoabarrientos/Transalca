<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transalca Admin | Gestionar Productos</title>
    <link rel="icon" type="image/png" href="/public/img/transalca-logo.png">
    <link href="/public/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/public/bootstrap/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/public/css/styles.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
    <div id="sidebarContainer"></div>
    <div class="main-content">
        <div id="navbarContainer"></div>
        <div class="content-area">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0">Gestionar Productos</h4>
                <div class="d-flex gap-2">
                    <input type="search" id="productSearch" class="form-control form-control-sm" placeholder="Buscar producto, codigo o descripcion..." style="width: 250px;">
                    <button class="btn btn-orange" onclick="openModal()"><i class="bi bi-plus-lg me-2"></i>Registrar Producto</button>
                </div>
            </div>
            <div class="card mb-3">
                <div class="card-body p-0">
                    <table class="table mb-0" data-no-auto-search="1">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Categoría</th>
                                <th>Marca</th>
                                <th>Sucursal</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="productBody"></tbody>
                    </table>
                </div>
            </div>
            <div class="d-flex justify-content-between align-items-center px-2 mb-4">
                <div class="d-flex align-items-center gap-3">
                    <div class="text-muted small" id="paginationInfo">Mostrando 0 de 0 productos</div>
                    <div class="d-flex align-items-center gap-1">
                        <span class="text-muted small" style="white-space: nowrap; font-size: 0.8rem;">Mostrar:</span>
                        <select class="form-select form-select-sm" id="productsPerPageSelect" style="width: auto; font-size: 0.75rem; padding: 0.2rem 1.6rem 0.2rem 0.4rem; height: 1.8rem; border-color: rgba(233, 93, 15, 0.2); border-radius: 4px;">
                            <option value="10">10</option>
                            <option value="20">20</option>
                            <option value="30" selected>30</option>
                        </select>
                    </div>
                </div>
                <nav aria-label="Navegación de productos">
                    <ul class="pagination pagination-sm mb-0 animate-fade-in" id="paginationControls">
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Registrar Producto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="productForm">
                    <input type="hidden" id="productOldCodigo">
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Código <span class="required">*</span></label>
                            <input type="text" class="form-control" id="codigo" name="codigo">
                            <div class="invalid-feedback"></div>
                        </div>
                        <div class="col-md-8 mb-3">
                            <label class="form-label">Nombre <span class="required">*</span></label>
                            <input type="text" class="form-control" id="nombre" name="nombre">
                            <div class="invalid-feedback"></div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea class="form-control" id="descripcion" name="descripcion" rows="2"></textarea>
                        <div class="invalid-feedback"></div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Precio <span class="required">*</span></label>
                            <input type="number" class="form-control" id="precio" name="precio" step="0.01" min="0.01">
                            <div class="invalid-feedback"></div>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Categoría <span class="required">*</span></label>
                            <select class="form-select" id="categoria" name="categoria" required></select>
                            <div class="invalid-feedback"></div>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Marca <span class="required">*</span></label>
                            <select class="form-select" id="marca" name="marca" required></select>
                            <div class="invalid-feedback"></div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Sucursales <span class="required">*</span></label>
                        <select class="form-select" id="sucursal_id" name="sucursal_id" multiple required></select>
                        <div class="invalid-feedback"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Imagen del Producto (Opcional)</label>
                        <input type="file" class="form-control" id="product_imagen" name="imagen" accept="image/png, image/jpeg, image/jpg, image/webp">
                        <img id="productImagePreview" class="product-form-image border shadow-sm mt-2" alt="Vista previa" style="width:100%; max-height:160px; object-fit:cover; border-radius:10px; display:none;">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-orange" onclick="saveData()">Guardar</button>
            </div>
        </div>
    </div>
</div>

<script src="/public/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/public/jquery/jquery.min.js"></script>
<script src="/public/js/admin_common.js"></script>
<script src="/public/js/products.js"></script>
</body>
</html>
