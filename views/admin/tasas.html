<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasa de Cambio - Transalca C.A.</title>
    <link rel="icon" type="image/png" href="/public/img/logo.png">
    <link href="/public/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/public/bootstrap/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/public/css/styles.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
    <div id="sidebarContainer"></div>
    <div class="main-content">
        <div id="navbarContainer"></div>
        <div class="content-area">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h4 class="fw-bold mb-1">Tasa de Cambio</h4>
                    <p class="text-muted mb-0" style="font-size:0.82rem;">Registro diario de tasas USD/Bs</p>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-orange" onclick="syncScraping()"><i class="bi bi-arrow-repeat me-1"></i>Sincronizar BCV</button>
                    <button class="btn btn-orange" onclick="openModal()"><i class="bi bi-plus-lg me-1"></i>Registrar Tasa</button>
                </div>
            </div>
            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="stat-card"><div class="stat-icon" style="background:var(--primary-soft);color:var(--primary);"><i class="bi bi-currency-dollar"></i></div><div><span class="stat-value" id="statLatest">--</span><span class="stat-label">Tasa Actual (Bs)</span></div></div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card"><div class="stat-icon" style="background:#DCFCE7;color:#16a34a;"><i class="bi bi-calendar-check"></i></div><div><span class="stat-value" id="statDate">--</span><span class="stat-label">Fecha Ultima Tasa</span></div></div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card"><div class="stat-icon" style="background:#FEF3C7;color:#B45309;"><i class="bi bi-person"></i></div><div><span class="stat-value" id="statFuente">--</span><span class="stat-label">Fuente</span></div></div>
                </div>
            </div>
            <div class="card">
                <div class="card-body p-0">
                    <table class="table mb-0">
                        <thead>
                            <tr><th class="col-id">ID</th><th>Fecha</th><th>Monto (Bs)</th><th>Fuente</th><th>Acciones</th></tr>
                        </thead>
                        <tbody id="tasaBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="tasaModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title" id="modalTitle">Registrar Tasa</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="tasaForm">
                    <input type="hidden" id="tasaId">
                    <div class="mb-3">
                        <label class="form-label">Fecha <span class="required">*</span></label>
                        <input type="date" class="form-control" id="fecha" name="fecha">
                        <div class="invalid-feedback"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Monto (Bs por 1 USD) <span class="required">*</span></label>
                        <input type="number" class="form-control" id="monto" name="monto" step="0.01" min="0.01">
                        <div class="invalid-feedback"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Fuente <span class="required">*</span></label>
                        <input type="text" class="form-control" id="fuente" name="fuente" placeholder="Ej: BCV, Manual, Juan Perez">
                        <div class="invalid-feedback"></div>
                    </div>
                </form>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button type="button" class="btn btn-orange" onclick="saveData()">Guardar</button></div>
        </div>
    </div>
</div>
<script src="/public/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/public/jquery/jquery.min.js"></script>
<script src="/public/js/admin_common.js"></script>
<script src="/public/js/tasas.js"></script>
</body>
</html>
