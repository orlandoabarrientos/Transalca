<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transalca Admin | Gestionar Tickets de Soporte</title>
    <link rel="icon" type="image/png" href="/public/img/logo.png">
    <link href="/public/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/public/bootstrap/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/public/sweetalert2/sweetalert2.min.css" rel="stylesheet">
    <link href="/public/css/styles.css" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
    <div id="sidebarContainer"></div>
    <div class="main-content">
        <div id="navbarContainer"></div>
        <div class="content-area">
            <div class="mb-4"><h4 class="fw-bold mb-0">Gestionar Tickets de Soporte</h4></div>
            <div class="card mb-3">
                <div class="card-body d-flex flex-wrap gap-2 align-items-end">
                    <div>
                        <label class="form-label mb-1">Estado</label>
                        <select id="ticketFilterStatus" class="form-select form-select-sm">
                            <option value="">Todos</option>
                            <option value="abierto">Abierto</option>
                            <option value="en_revision">En revisión</option>
                            <option value="espera_cliente">Espera cliente</option>
                            <option value="resuelto">Resuelto</option>
                            <option value="cerrado">Cerrado</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label mb-1">Prioridad</label>
                        <select id="ticketFilterPriority" class="form-select form-select-sm">
                            <option value="">Todas</option>
                            <option value="baja">Baja</option>
                            <option value="media">Media</option>
                            <option value="alta">Alta</option>
                            <option value="critica">Crítica</option>
                        </select>
                    </div>
                    <button type="button" id="ticketFilterBtn" class="btn btn-sm btn-primary">
                        <i class="bi bi-funnel me-1"></i>Filtrar
                    </button>
                    <button type="button" id="ticketRefreshBtnAdmin" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-arrow-clockwise me-1"></i>Actualizar
                    </button>
                </div>
            </div>

            <div class="row g-3">
                <div class="col-lg-5">
                    <div class="card h-100">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <span>Tickets</span>
                            <span class="badge bg-secondary" id="ticketCountAdmin">0</span>
                        </div>
                        <div class="card-body p-0">
                            <div id="adminTicketsList" class="list-group list-group-flush"></div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-7">
                    <div class="card h-100">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <span>Conversación</span>
                            <div class="d-flex align-items-center gap-2">
                                <select id="adminTicketStatusSelect" class="form-select form-select-sm" style="min-width:160px;" disabled>
                                    <option value="abierto">Abierto</option>
                                    <option value="en_revision">En revisión</option>
                                    <option value="espera_cliente">Espera cliente</option>
                                    <option value="resuelto">Resuelto</option>
                                    <option value="cerrado">Cerrado</option>
                                </select>
                                <button type="button" id="adminTicketStatusBtn" class="btn btn-sm btn-outline-primary" disabled>
                                    Guardar Estado
                                </button>
                            </div>
                        </div>
                        <div class="card-body d-flex flex-column">
                            <div id="adminTicketDetail" class="mb-3 text-muted">
                                Seleccione un ticket para abrir la conversación.
                            </div>
                            <div id="adminTicketChat" class="border rounded p-2 mb-3 flex-grow-1" style="min-height:320px;max-height:420px;overflow-y:auto;">
                                <div class="text-muted small">Sin mensajes</div>
                            </div>
                            <form id="adminReplyForm" class="d-flex gap-2" style="display:none;">
                                <textarea id="adminReplyMessage" class="form-control" rows="2" placeholder="Responder al cliente..." required></textarea>
                                <button type="submit" class="btn btn-primary">Enviar</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/public/jquery/jquery.min.js"></script>
<script src="/public/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/public/sweetalert2/sweetalert2.all.min.js"></script>
<script src="/public/js/admin_common.js"></script>
<script src="/public/js/constants.js"></script>
<script src="/public/js/admin_tickets.js"></script>
</body>
</html>
