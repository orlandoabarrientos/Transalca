<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/png" href="/public/img/logo.png">
    <link href="/public/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/public/bootstrap/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/public/css/styles.css" rel="stylesheet">
    <style>
        .chart-card { background: white; border-radius: 16px; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); height: 100%; border: 1px solid var(--border-color); }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .chart-title { font-size: 1.1rem; font-weight: 700; color: var(--text-dark); margin: 0; }
        .chart-container { position: relative; height: 300px; width: 100%; }
        
        
        .filter-ribbon { background: var(--primary-soft); padding: 1rem 1.5rem; border-radius: 12px; display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; border-left: 4px solid var(--primary); }
        .filter-ribbon select { border-color: transparent; font-weight: 500; color: var(--primary-dark); cursor: pointer; }
    </style>
</head>
<body>
<div class="admin-layout">
    <div id="sidebarContainer"></div>
    <div class="main-content">
        <div id="navbarContainer"></div>
        
        <div class="content-area">
            <div class="mb-4">
                <h4 class="fw-bold mb-1">Métricas de Rendimiento</h4>
                <p class="text-muted small">Visualización en vivo del estado del negocio.</p>
            </div>
            
            <div class="filter-ribbon">
                <i class="bi bi-funnel-fill fs-5" style="color:var(--primary);"></i>
                <span class="fw-bold" style="color:var(--primary-dark);">Filtro Rápido Visual:</span>
                <div style="width: 250px;">
                    <select class="form-select form-select-sm" id="timelineFilter" onchange="loadStats()">
                        <option value="7">Últimos 7 Días</option>
                        <option value="30" selected>Últimos 30 Días</option>
                        <option value="90">Últimos 3 Meses</option>
                        <option value="365">Este Ańo</option>
                    </select>
                </div>
                <div style="margin-left: auto;">
                    <button class="btn btn-sm btn-outline-primary" onclick="loadStats()"><i class="bi bi-arrow-clockwise me-1"></i>Actualizar</button>
                </div>
            </div>
            
            
            <div class="row g-4 mb-4">
                <div class="col-lg-8">
                    <div class="chart-card">
                        <div class="chart-header">
                            <h3 class="chart-title"><i class="bi bi-graph-up-arrow me-2" style="color:var(--primary);"></i>Evolución de Ingresos</h3>
                        </div>
                        <div class="chart-container">
                            <canvas id="revenueChart"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="chart-card">
                        <div class="chart-header">
                            <h3 class="chart-title"><i class="bi bi-pie-chart-fill me-2" style="color:var(--orange);"></i>Estado de Órdenes</h3>
                        </div>
                        <div class="chart-container">
                            <canvas id="statusChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            
            
            <div class="row g-4">
                <div class="col-lg-6">
                    <div class="chart-card">
                        <div class="chart-header">
                            <h3 class="chart-title"><i class="bi bi-bar-chart-fill me-2" style="color: #10B981;"></i>Top Productos Vendidos</h3>
                        </div>
                        <div class="chart-container">
                            <canvas id="productsChart"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="chart-card">
                        <div class="chart-header">
                            <h3 class="chart-title"><i class="bi bi-wallet2 me-2" style="color: #6366F1;"></i>Distribución de Pagos</h3>
                        </div>
                        <div class="chart-container">
                            <canvas id="paymentsChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            <br>
        </div>
    </div>
</div>

<script src="/public/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/public/jquery/jquery.min.js"></script>
<script src="/public/jquery/chart.js"></script>
<script src="/public/js/admin_common.js"></script>
<script src="/public/js/stats.js"></script>
</body>
</html>
